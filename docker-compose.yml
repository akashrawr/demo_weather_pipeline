services:
  postgres:
    image: postgres:16
    container_name: weather-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-weather_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-weather_password}
      POSTGRES_DB: ${POSTGRES_DB:-weather_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER:-weather_user} -d ${POSTGRES_DB:-weather_db}
      interval: 10s
      timeout: 5s
      retries: 5
  etl:
    build: .
    container_name: weather-etl
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-weather_user}:${POSTGRES_PASSWORD:-weather_password}@postgres:5432/${POSTGRES_DB:-weather_db}
volumes:
  postgres_data: