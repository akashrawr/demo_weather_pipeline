name: Weather Pipeline Tests
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://weather_user:weather_password@localhost:5432/weather_test
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: weather_user
          POSTGRES_PASSWORD: weather_password
          POSTGRES_DB: weather_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run:
          pip install -r requirements.txt

      - name: Run migrations
        run:
          alembic upgrade head

      - name: Run tests
        run:
          pytest -v